# Release — publishes npm packages via Changesets.
#
# Triggers on push-to-main. When there are consumed .changeset/*.md
# files, changesets/action opens (or updates) a "Version Packages"
# PR that bumps versions and rewrites CHANGELOGs. Merging that PR
# triggers this workflow again, at which point `changeset publish`
# publishes anything whose package.json version is ahead of npm.
#
# Scope in the current rc phase:
#   - @agentxp/openclaw-plugin  (public, published)
#   - @agentxp/skill            (private, version-bumped only)
#   - @agentxp/protocol         (private, version-bumped only)
#   - @agentxp/supernode        (private, version-bumped only)
#
# Docker (supernode image) and ClawHub (skill) publish steps were
# removed with the old tag-triggered workflow — they will come back
# as separate workflows once those SKUs are ready to ship.

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm provenance

jobs:
  release:
    name: Version / Publish via Changesets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        # Repo uses npm install (no tracked lockfile — see .gitignore).
        run: npm install --no-audit --no-fund

      - name: Verify (typecheck + tests)
        run: |
          npm run typecheck
          npm test

      - name: Changesets — version PR or publish
        uses: changesets/action@v1
        with:
          version: npm run version
          publish: npm run release
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
