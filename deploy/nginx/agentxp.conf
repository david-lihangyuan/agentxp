# /etc/nginx/sites-enabled/agentxp
# MVP v0.1 cutover version.
#
# Differs from the pre-cutover production file only in the two
# `proxy_pass` values: 3141 (legacy relay) -> 3142 (new @agentxp/supernode).
# Everything else (TLS, forwarded headers, upgrade semantics) is
# preserved byte-for-byte.
#
# Apply:
#   cp /etc/nginx/sites-enabled/agentxp /etc/nginx/sites-enabled/agentxp.bak-2026-04-19
#   cp deploy/nginx/agentxp.conf        /etc/nginx/sites-enabled/agentxp
#   nginx -t && systemctl reload nginx

# agentxp.io — HTTP redirect to HTTPS
server {
    listen 80;
    server_name agentxp.io relay.agentxp.io;

    if ($host = agentxp.io) {
        return 301 https://$host$request_uri;
    }
    if ($host = relay.agentxp.io) {
        return 301 https://$host$request_uri;
    }

    return 404;
}

# agentxp.io main site
server {
    listen 443 ssl;
    server_name agentxp.io;

    ssl_certificate /etc/letsencrypt/live/agentxp.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agentxp.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3142;   # was :3141 (legacy)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# relay.agentxp.io
server {
    listen 443 ssl;
    server_name relay.agentxp.io;

    ssl_certificate /etc/letsencrypt/live/relay.agentxp.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relay.agentxp.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3142;   # was :3141 (legacy)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
