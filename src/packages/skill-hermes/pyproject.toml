[project]
name = "agentxp-skill-hermes"
version = "0.1.0"
description = "AgentXP Skill-Hermes — Python port of @agentxp/skill for pip/pipx agent hosts"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
dependencies = [
    "pynacl>=1.5.0",
]

[project.scripts]
agentxp-hermes = "agentxp_skill_hermes.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["agentxp_skill_hermes"]

[tool.hatch.build.targets.wheel.force-include]
"agentxp_skill_hermes/SKILL.md" = "agentxp_skill_hermes/SKILL.md"

[dependency-groups]
dev = [
    "pytest>=8.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
